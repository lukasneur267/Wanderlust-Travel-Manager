<div class="container">
  <div class="row row-cols-1 row-cols-md-2 row-cols-lg-3">
    @for (destination of destinationsArray; track $index) {
      <div class="col" [class.unavailable]="!destination.availability">
        <div class="card my-3 shadow-sm bg-body-tertiary rounded">
          <img
            class="card-img-top"
            [src]="'images/' + destination.image"
            [alt]="destination.name"
          />
          <div class="card-body">
            <div class="form-check d-flex justify-content-end">
              <input
                class="form-check-input"
                type="checkbox"
                value=""
                id="flexCheckChecked"
                [checked]="destination.availability"
                (change)="destination.availability = !destination.availability"
              />
              <label class="form-check-label ms-2" for="flexCheckChecked"> Availability </label>
            </div>
            <h4 class="card-title">{{ destination.name }}</h4>
            @if (destination.availability) {
              <p class="card-text">
                {{ destination.description }}
              </p>
              <p class="card-text"><strong>Price:</strong> {{ formatPrice(destination.price) }}</p>

              <div class="text-center mt-3">
                <a [routerLink]="['/details', destination.id]" class="btn btn-warning me-3"
                  >Details</a
                >
                <a class="btn btn-primary" (click)="addToBookings(destination)">Add to Bookings</a>
              </div>
            } @else {
              <h6 class="text-danger my-3">This destination is fully booked!</h6>
            }
          </div>
        </div>
      </div>
    }
  </div>
</div>
